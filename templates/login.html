<!-- templates/login.html -->
{% extends 'base.html' %}
{% block content %}
<style>
  .login-container {
    min-height: calc(100vh - 100px);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    padding: 40px;
    border: 1px solid rgba(0,0,0,0.06);
  }

  .login-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-logo {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 24px;
    margin: 0 auto 16px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
  }

  .login-header h3 {
    font-weight: 800;
    font-size: 1.75rem;
    color: #1f2937;
    margin-bottom: 8px;
  }

  .login-header p {
    color: #64748b;
    font-size: 0.95rem;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    font-weight: 600;
    color: #1f2937;
    margin-bottom: 8px;
    display: block;
    font-size: 0.9rem;
  }

  .form-control {
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.95rem;
    transition: all 0.2s ease;
    background: #f8fafc;
  }

  .form-control:focus {
    background: white;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .btn-login {
    width: 100%;
    padding: 12px 16px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 1rem;
    margin-top: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
  }

  .btn-login:hover {
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    transform: translateY(-2px);
  }

  .login-footer {
    text-align: center;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,0,0,0.06);
  }

  .login-footer p {
    color: #64748b;
    font-size: 0.9rem;
    margin-bottom: 16px;
  }

  .btn-back {
    display: inline-block;
    padding: 8px 16px;
    border: 1px solid rgba(0,0,0,0.12);
    background: white;
    border-radius: 8px;
    text-decoration: none;
    color: #2563eb;
    font-weight: 600;
    transition: all 0.2s ease;
  }

  .btn-back:hover {
    background: #f8fafc;
    border-color: #2563eb;
  }

  .security-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #10b981;
    font-size: 0.85rem;
    margin-top: 16px;
    padding: 8px;
    background: rgba(16, 185, 129, 0.05);
    border-radius: 6px;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }
</style>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">CB</div>
      <h3>Welcome Back</h3>
      <p>Sign in to access your account</p>
    </div>

    <form method="post">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          required 
          id="email"
          name="email" 
          type="email" 
          class="form-control" 
          placeholder="Enter your email"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          required 
          id="password"
          name="password" 
          type="password" 
          class="form-control" 
          placeholder="Enter your password"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
      </button>

      <div class="security-badge">
        <i class="bi bi-shield-check"></i>
        Secure encrypted connection
      </div>
    </form>

    <div class="login-footer">
      <p>Don't have an account?</p>
      <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
        <a href="{{ url_for('signup_student') }}" class="btn-back" style="color: #2563eb; text-decoration: none;">
          <i class="bi bi-person-check me-1"></i> Student Signup
        </a>
        <a href="{{ url_for('signup_parent') }}" class="btn-back" style="color: #2563eb; text-decoration: none;">
          <i class="bi bi-people me-1"></i> Parent Signup
        </a>
      </div>
      <hr style="margin: 16px 0; opacity: 0.5;">
      <a href="{{ url_for('landing') }}" class="btn-back">
        <i class="bi bi-house me-1"></i> Back to Home
      </a>
      <p style="color: #64748b; font-size: 0.85rem; margin-top: 12px; opacity: 0.8;">
        Admin credentials are available for system administrators.
      </p>
    </div>
  </div>
</div>
{% endblock %}
