{% extends 'base.html' %}
{% block content %}
<div class="container-fluid p-4">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <h4 class="mb-4 text-primary fw-bold">Edit Bus</h4>
            
            <form method="post" class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-500">Bus Number</label>
                    <input type="text" name="bus_number" required class="form-control" 
                           value="{{ bus.bus_number }}" placeholder="e.g., BUS001"/>
                </div>
                
                <div class="col-12">
                    <label class="form-label fw-500">Capacity</label>
                    <input type="number" name="capacity" required class="form-control" 
                           value="{{ bus.capacity }}" placeholder="Enter bus capacity" min="1"/>
                </div>
                
                <div class="col-12">
                    <label class="form-label fw-500">Assigned Driver (optional)</label>
                    <select name="driver_id" class="form-select">
                        <option value="">-- No Driver --</option>
                        {% for d in drivers %}
                            <option value="{{ d.id }}" 
                                    {% if bus.driver_id == d.id %}selected{% endif %}>
                                {{ d.full_name }} ({{ d.user.email if d.user else '' }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-check-circle me-2"></i>Update Bus
                    </button>
                    <a href="{{ url_for('admin_buses') }}" class="btn btn-outline-secondary btn-lg ms-2">
                        <i class="bi bi-x-circle me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .card {
        background: white;
        border-radius: 12px;
        margin-top: 1.5rem;
    }
    
    .form-label {
        color: #374151;
        font-size: 0.95rem;
        margin-bottom: 0.5rem;
    }
    
    .form-control,
    .form-select {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 0.625rem 0.875rem;
        font-size: 0.95rem;
        transition: all 0.2s ease;
    }
    
    .form-control:focus,
    .form-select:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        border: none;
        color: white;
        border-radius: 8px;
        font-weight: 500;
        transition: all 0.2s ease;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
    }
    
    .btn-outline-secondary {
        border: 1.5px solid #d1d5db;
        color: #6b7280;
        border-radius: 8px;
        font-weight: 500;
        transition: all 0.2s ease;
    }
    
    .btn-outline-secondary:hover {
        border-color: #6b7280;
        color: #374151;
        background: transparent;
    }
    
    .text-primary {
        color: #2563eb !important;
    }
</style>
{% endblock %}
