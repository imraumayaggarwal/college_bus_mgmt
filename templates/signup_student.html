{% extends 'base.html' %}
{% block content %}
<style>
  .signup-container {
    min-height: calc(100vh - 100px);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .signup-card {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    padding: 40px;
    border: 1px solid rgba(0,0,0,0.06);
  }

  .signup-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .signup-logo {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 24px;
    margin: 0 auto 16px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
  }

  .signup-header h3 {
    font-weight: 800;
    font-size: 1.75rem;
    color: #1f2937;
    margin-bottom: 8px;
  }

  .signup-header p {
    color: #64748b;
    font-size: 0.95rem;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    font-weight: 600;
    color: #1f2937;
    margin-bottom: 8px;
    display: block;
    font-size: 0.9rem;
  }

  .form-control {
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.95rem;
    transition: all 0.2s ease;
    background: #f8fafc;
  }

  .form-control:focus {
    background: white;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .btn-signup {
    width: 100%;
    padding: 12px 16px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 1rem;
    margin-top: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
  }

  .btn-signup:hover {
    background: linear-gradient(135deg, #059669, #047857);
    box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
    transform: translateY(-2px);
  }

  .signup-footer {
    text-align: center;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,0,0,0.06);
  }

  .signup-footer p {
    color: #64748b;
    font-size: 0.9rem;
    margin-bottom: 12px;
  }

  .signup-footer a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.2s ease;
  }

  .signup-footer a:hover {
    color: #1d4ed8;
    text-decoration: underline;
  }
</style>

<div class="signup-container">
  <div class="signup-card">
    <div class="signup-header">
      <div class="signup-logo"><i class="bi bi-person-check"></i></div>
      <h3>Student Signup</h3>
      <p>Create your account to get started</p>
    </div>

    <form method="post">
      <div class="form-group">
        <label class="form-label" for="full_name">Full Name</label>
        <input 
          id="full_name"
          name="full_name" 
          required 
          class="form-control"
          placeholder="Enter your full name"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          id="email"
          name="email" 
          type="email" 
          required 
          class="form-control"
          placeholder="Enter your email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          id="password"
          name="password" 
          type="password" 
          required 
          class="form-control"
          placeholder="Create a strong password"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="roll_number">Roll Number <span style="color: #94a3b8; font-weight: 400;">(optional)</span></label>
        <input 
          id="roll_number"
          name="roll_number" 
          class="form-control"
          placeholder="e.g., CSE-2024-001"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">Phone Number <span style="color: #94a3b8; font-weight: 400;">(optional)</span></label>
        <input 
          id="phone"
          name="phone" 
          class="form-control"
          placeholder="Enter your phone number"
        />
      </div>

      <button type="submit" class="btn-signup">
        <i class="bi bi-person-plus me-2"></i> Create Student Account
      </button>
    </form>

    <div class="signup-footer">
      <p>Already have an account?</p>
      <a href="{{ url_for('login') }}">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In Here
      </a>
      <hr style="margin: 16px 0; opacity: 0.5;">
      <a href="{{ url_for('landing') }}" style="font-size: 0.9rem;">
        <i class="bi bi-house me-1"></i> Back to Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
