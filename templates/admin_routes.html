{% extends 'base.html' %}
{% block content %}
<style>
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .table-card {
    background: white;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .table {
    margin: 0;
  }

  .table thead {
    background: linear-gradient(135deg, rgba(37, 99, 235, 0.03), rgba(124, 58, 237, 0.03));
    border-bottom: 2px solid rgba(0,0,0,0.06);
  }

  .table th {
    font-weight: 700;
    color: #1f2937;
    padding: 14px 16px;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .table tbody tr {
    border-bottom: 1px solid rgba(0,0,0,0.04);
    transition: all 0.2s ease;
  }

  .table tbody tr:hover {
    background: rgba(37, 99, 235, 0.03);
  }

  .table td {
    padding: 14px 16px;
    color: #475569;
    vertical-align: middle;
  }

  .color-badge {
    display: inline-block;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 2px solid rgba(0,0,0,0.1);
  }

  .empty-state {
    text-align: center;
    padding: 48px 16px;
    color: #64748b;
  }

  .empty-icon {
    font-size: 3rem;
    color: #cbd5e1;
    margin-bottom: 12px;
  }
</style>

<div class="page-header">
  <div>
    <h3 style="margin: 0; font-weight: 800;">Manage Routes</h3>
    <div class="small-muted"><i class="bi bi-map me-1"></i>Create and organize bus routes</div>
  </div>
  <a class="btn btn-primary" href="{{ url_for('admin_create_route') }}"><i class="bi bi-plus me-1"></i> Create Route</a>
</div>

<div class="table-card">
  <div style="overflow-x: auto;">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>#</th>
          <th>Route Name</th>
          <th>Route Code</th>
          <th>Color</th>
          <th style="text-align: center;">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for r in routes %}
        <tr>
          <td>#{{ r.id }}</td>
          <td><strong>{{ r.name }}</strong></td>
          <td><code style="background: #f3f4f6; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem;">{{ r.route_code }}</code></td>
          <td>
            <div style="display: flex; align-items: center; gap: 8px;">
              <span class="color-badge" style="background: {{ r.color }};"></span>
              <span style="font-size: 0.85rem; color: #64748b;">{{ r.color }}</span>
            </div>
          </td>
          <td style="text-align: center;">
            <a href="#" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil me-1"></i> Edit</a>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="5">
            <div class="empty-state">
              <div class="empty-icon"><i class="bi bi-inbox"></i></div>
              <p style="margin: 0;">No routes created yet</p>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
